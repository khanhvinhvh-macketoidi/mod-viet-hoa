services:
  web:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    restart: unless-stopped
    env_file:
      - ../../.env.production
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ../../data:/app/data
      - ../../public/uploads:/app/public/uploads
      - ../../logs:/app/logs
      - ../../backups:/app/backups
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
